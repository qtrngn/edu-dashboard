<section class="min-h-screen lg:grid lg:grid-cols-2">
  <!-- Left Side -->
  <div
    class="relative hidden min-h-screen overflow-hidden lg:block"
    [class.bg-sky-50]="role === 'teacher'"
    [class.bg-emerald-50]="role === 'student'"
  >
    <div class="flex h-full flex-col justify-between px-10 py-8 text-slate-900">
      <!-- Logo -->
      <div>
        <p class="text-3xl font-bold">Education</p>
      </div>

          <!-- Hero Content -->
      <div class="flex flex-1 items-center justify-center">
        <div class="mx-auto w-full max-w-xl text-center">
          <p class="mb-4 text-sm font-medium uppercase tracking-[0.2em] text-slate-600">
            {{ panelLabel }}
          </p>

          <h1 class="mb-6 text-5xl font-bold leading-tight">
            {{ panelTitle }}
          </h1>
        </div>
      </div>
    </div>
  </div>


  <!-- Right Side / Login Form -->
  <div class="flex min-h-screen items-center justify-center bg-black px-6 py-10">
    <div class="w-full max-w-md rounded-3xl border border-white/10 bg-white/5 p-8 shadow-xl backdrop-blur-sm">
      <ng-content></ng-content>
    </div>
  </div>
</section>
