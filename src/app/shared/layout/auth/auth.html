<section class="min-h-screen w-full lg:grid lg:grid-cols-2">
  <!-- Left Side -->
  <div
    class="relative hidden min-h-screen overflow-hidden lg:block {{ roleConfig.authPanelBgClass }}"
  >
    <div class="flex h-full flex-col justify-between px-10 py-8 text-slate-900">
      <!-- Logo -->
      <div>
        <p class="text-3xl font-bold">Education</p>
      </div>

      <!-- Hero Content -->
      <div class="flex flex-1 items-center justify-center">
        <div class="mx-auto w-full max-w-xl text-center">
          <p class="mb-4 text-sm font-medium uppercase tracking-[0.2em] text-slate-600">
            {{ panelLabel }}
          </p>

          <h1 class="mb-6 text-5xl font-bold leading-tight">
            {{ panelTitle }}
          </h1>
        </div>
      </div>
    </div>
  </div>

  <!-- Right Side -->
  <div class="flex min-h-screen w-full items-center justify-center bg-slate-700 px-6 py-10">
    <ng-content></ng-content>
  </div>
</section>
