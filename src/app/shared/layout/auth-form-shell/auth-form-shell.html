<div class="w-full max-w-[92vw] rounded-2xl border border-white/10 bg-white/5 p-5 shadow-xl backdrop-blur-sm sm:max-w-md sm:rounded-3xl sm:p-8">
  <header class="mb-6 text-center sm:mb-8">
    @if (badgeLabel) {
      <p class="mb-2 text-xs font-medium uppercase tracking-[0.2em] text-fuchsia-400 sm:mb-3 sm:text-sm">
        {{ badgeLabel }}
      </p>
    }

    <h2 class="text-3xl font-bold text-white sm:text-4xl">
      {{ title }}
    </h2>

    @if (description) {
      <p class="mt-2 text-sm text-slate-400 sm:mt-3">
        {{ description }}
      </p>
    }
  </header>

  <main>
    <ng-content select="[form-body]"></ng-content>
  </main>

  <footer class="mt-5 sm:mt-6">
    <ng-content select="[form-footer]"></ng-content>
  </footer>
</div>
