<div class="fixed inset-0 z-50 flex items-center justify-center bg-black/60 px-4">
  <div class="w-full max-w-lg rounded-2xl border border-white/10 bg-slate-900 p-6 text-white shadow-2xl">
    <div class="mb-6 flex items-start justify-between gap-4">
      <div>
        <h2 class="text-xl font-semibold">{{ title }}</h2>
      </div>

      <button
        type="button"
        (click)="onCloseClick()"
        class="rounded-lg border border-white/10 bg-white/5 px-3 py-1.5 text-sm text-white transition hover:bg-white/10"
      >
        Close
      </button>
    </div>

    <div class="space-y-4">
      <ng-content></ng-content>
    </div>
  </div>
</div>
