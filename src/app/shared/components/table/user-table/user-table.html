<div class="overflow-hidden rounded-2xl border border-white/10 bg-white/5">
  @if (users.length === 0) {
    <div class="px-6 py-10 text-center text-sm text-slate-400">
      {{ emptyMessage }}
    </div>
  } @else {
    <div class="overflow-x-auto">
      <table class="min-w-160 w-full divide-y divide-white/10">
        <thead class="bg-white/5">
          <tr class="text-left">
            @for (column of columns; track column.fieldname) {
              <th class="whitespace-nowrap px-4 py-4 text-sm font-medium text-slate-300 sm:px-6">
                {{ column.label }}
              </th>
            }
          </tr>
        </thead>

        <tbody class="divide-y divide-white/10">
          @for (user of users; track user.id) {
            <tr
              (click)="onRowClick(user)"
              class="cursor-pointer transition hover:bg-white/5"
            >
              @for (column of columns; track column.fieldname) {
                <td class="whitespace-nowrap px-4 py-4 text-sm text-slate-300 sm:px-6">
                  {{ getCellValue(user, column.fieldname) }}
                </td>
              }
            </tr>
          }
        </tbody>
      </table>
    </div>
  }
</div>
