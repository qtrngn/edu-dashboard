<div class="space-y-4">
  @for (field of fields; track field.key) {
    <div class="space-y-2">
      <label class="text-sm text-slate-300">{{ field.label }}</label>

      <input
        type="text"
        [value]="getFieldValue(field.key)"
        (input)="onFieldChange(field.key, $any($event.target).value)"
        class="w-full rounded-xl border border-white/10 bg-white/5 px-4 py-3 text-sm text-white outline-none placeholder:text-slate-500"
        [placeholder]="field.placeholder"
      />
    </div>
  }
</div>
