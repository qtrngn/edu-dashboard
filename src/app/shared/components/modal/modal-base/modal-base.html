<div class="fixed inset-0 z-50 flex items-center justify-center bg-slate-950/70 px-4 backdrop-blur-sm">
  <div
    class="w-full rounded-2xl border border-white/10 bg-slate-900/95 text-white shadow-2xl shadow-black/40"
    [class]="modalSizeClass"
  >
    <header class="flex items-start justify-between border-b border-white/10 px-6 py-4">
      <div>
        <h2 class="text-lg font-semibold text-white">
          {{ config.header.title }}
        </h2>

        @if (config.header.description) {
          <p class="mt-1 text-sm text-slate-400">
            {{ config.header.description }}
          </p>
        }
      </div>

      @if (showCloseButton) {
        <button
          type="button"
          class="rounded-full px-2 py-1 text-slate-400 transition hover:bg-white/10 hover:text-white"
          (click)="onCloseClick()"
        >
          ×
        </button>
      }
    </header>

    <section class="px-6 py-5">
      <ng-content />
    </section>

    @if (config.footerActions?.length) {
      <footer class="flex justify-end gap-3 border-t border-white/10 px-6 py-4">
        @for (action of config.footerActions; track action.action) {
          <button
            type="button"
            class="rounded-xl px-4 py-2 text-sm font-medium transition disabled:cursor-not-allowed disabled:opacity-50"
            [class]="getActionButtonClass(action.variant)"
            [disabled]="action.disabled"
            (click)="onActionClick(action.action)"
          >
            {{ action.label }}
          </button>
        }
      </footer>
    }
  </div>
</div>
