<app-auth
  [role]="role"
  [panelLabel]="roleConfig.label"
  [panelTitle]="roleConfig.authPanelTitle"
>
  <app-auth-form-shell
    [badgeLabel]="formConfig.badgeLabel"
    [title]="formConfig.title"
    [description]="formConfig.description"
  >
    <form form-body (submit)="onSubmit($event)" class="space-y-5">
      <div>
        <input
          [formField]="loginForm.email"
          type="email"
          placeholder="Email"
          class="auth-input"
        />
      </div>

      <div>
        <input
          [formField]="loginForm.password"
          type="password"
          placeholder="Password"
          class="auth-input"
        />
      </div>

      @if (loginError()) {
        <p class="rounded-xl border border-red-400/30 bg-red-500/10 px-4 py-3 text-sm text-red-200">
          {{ loginError() }}
        </p>
      }

      <button type="submit" class="auth-button">
        {{ formConfig.submitLabel }}
      </button>
    </form>

    <p form-footer class="text-center text-sm text-slate-400">
      {{ formConfig.footerText }}
      <a [routerLink]="roleConfig.registerPath" class="auth-link">
        {{ formConfig.footerLinkLabel }}
      </a>
    </p>
  </app-auth-form-shell>
</app-auth>
