<app-auth
  [role]="role"
  [panelLabel]="role === 'admin' ? 'Admin' : 'Teacher'"
  [panelTitle]="role === 'admin' ? 'Manage teachers' : 'Manage students'"
>
  <!-- Header -->
  <div class="mb-8 text-center">
    <p class="mb-3 text-sm font-medium uppercase tracking-[0.2em] text-fuchsia-400">Login</p>
    <h2 class="text-4xl font-bold text-white">Welcome back</h2>
  </div>

  <!-- Form -->
  <form (submit)="onSubmit($event)" class="space-y-5">
    <div>
      <input [formField]="loginForm.email" type="email" placeholder="Email" class="auth-input" />
    </div>

    <div>
      <input
        [formField]="loginForm.password"
        type="password"
        placeholder="Password"
        class="auth-input"
      />
    </div>

    <!-- Error Message -->
    @if (loginError()) {
      <p class="rounded-xl border border-red-400/30 bg-red-500/10 px-4 py-3 text-sm text-red-200">
        {{ loginError() }}
      </p>
    }

    <!-- Submit Button -->
    <button type="submit" class="auth-button">Log in</button>

    <!-- Register Link -->
    <p class="text-center text-sm text-slate-400">
      Don’t have an account?
      <a [routerLink]="['/register', role]" class="auth-link"> Register </a>
    </p>
  </form>
</app-auth>
