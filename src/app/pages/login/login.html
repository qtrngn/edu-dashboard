<app-auth
  [role]="role"
  [panelLabel]="role === 'teacher' ? 'Teacher' : 'Student'"
  [panelTitle]="role === 'teacher' ? 'Manage teachers' : 'Manage students'"
>
  <!-- Header -->
  <div class="mb-8 text-center">
    <p class="mb-3 text-sm font-medium uppercase tracking-[0.2em] text-fuchsia-400">
      Login
    </p>
    <h2 class="text-4xl font-bold text-white">Welcome back</h2>
  </div>

  <!-- Form -->
  <form (submit)="onSubmit($event)" class="space-y-5">
    <div>
      <input
        [formField]="loginForm.email"
        type="email"
        placeholder="Email"
        class="auth-input"
      />
    </div>

    <div>
      <input
        [formField]="loginForm.password"
        type="password"
        placeholder="Password"
        class="auth-input"
      />
    </div>

    <button
      type="submit"
      class="auth-button"
    >
      Log in
    </button>

    <p class="text-center text-sm text-slate-400">
      Don’t have an account?
      <a [routerLink]="['/register', role]" class="auth-link">
        Register
      </a>
    </p>
  </form>
</app-auth>
